<table class="table">
  <thead>
      <tr>
          <th scope="col">ID</th>
          <th scope="col">Título</th>
          <th scope="col">Descrição</th>
          <th scope="col">Data/Hora</th>
          <th scope="col">Local</th>
      </tr>
  </thead>
  <tbody>
    <tr *ngFor="let agenda of agendas">
      <th scope="row">{{agenda.id}}</th>
      <td>{{agenda.titulo}}</td>
      <td>{{agenda.descricao}}</td>
      <td>{{agenda.data_hora}}</td>
      <td>{{agenda.local}}</td>
      <td><button type="button" class="btn btn-primary">Agendar</button></td>
    </tr>
  </tbody>
</table>
