<div class="container">
  <h1>Criando Agendamento</h1>
  <div class="mb-3">
      <label for="titulo" class="form-label">Título</label>
      <input type="text" class="form-control" id="titulo" placeholder="Digite o título da Agendamento">
  </div>
  <div class="mb-3">
      <label for="descricao" class="form-label">Descrição</label>
      <input type="text" class="form-control" id="descricao" placeholder="Digite a descrição da Agendamento">
  </div>
  <div class="mb-3">
      <label for="data/hora" class="form-label">Data/Hora</label>
      <input type="datetime" class="form-control" id="data/hora" placeholder="Digite a data e hora da Agendamento">
  </div>
  <div class="mb-3">
      <label for="local" class="form-label">Local</label>
      <input type="text" class="form-control" id="local" placeholder="Digite o local">
  </div>
  <button type="submit" class="btn btn-primary">Agendar</button>
</div>
